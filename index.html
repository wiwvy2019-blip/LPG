<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPG Insight - Pro Dashboard</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="LPG Insight">
    <meta name="theme-color" content="#3b82f6">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3411/3411514.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow: hidden; margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; height: 100vh; width: 100vw; }
        .map-overlay { position: absolute; z-index: 1000; pointer-events: none; width: 100%; }
        .interactable { pointer-events: auto; }
        .glass-ui { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); color: #1e293b; }
        .user-dot { width: 16px; height: 16px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); }
        .leaflet-control-attribution { display: none; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"] { -webkit-appearance: none; border-radius: 0.75rem; }
        
        /* Custom Toggle Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #10b981; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- UI Overlay: Top -->
    <div class="map-overlay top-0 p-4 space-y-3">
        <div class="glass-ui interactable flex items-center gap-2 p-2 rounded-2xl shadow-xl">
            <div class="p-2 text-blue-600"><i data-lucide="search" class="w-5 h-5"></i></div>
            <input type="text" id="search-input" onfocus="showSearchPanel()" class="bg-transparent border-none outline-none text-sm w-full placeholder:text-slate-400 font-medium" placeholder="ค้นหาหรือจิ้มแผนที่เพื่อปักหมุด...">
            <button onclick="openGoogleMapsSearch()" class="bg-blue-600 p-2 rounded-xl text-white shadow-md">
                <i data-lucide="map" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="search-panel" class="hidden glass-ui interactable rounded-2xl p-4 shadow-2xl mt-1 border border-blue-100 max-h-[40vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ปั๊มที่บันทึกไว้</span>
                <button onclick="closeSearchPanel()" class="p-1 text-slate-400"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="search-results-list" class="space-y-2"></div>
        </div>

        <!-- Dashboard Stats -->
        <div class="flex gap-2">
            <div class="glass-ui interactable p-3 rounded-2xl border-l-4 border-blue-600 flex-1 shadow-md">
                <span class="text-[9px] font-bold text-blue-600 uppercase block">ความเร็ว</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black text-slate-800" id="current-speed">0</span>
                    <span class="text-[8px] text-slate-400 uppercase">km/h</span>
                </div>
            </div>
            <div class="glass-ui interactable p-3 rounded-2xl border-l-4 border-emerald-600 flex-1 shadow-md">
                <span class="text-[9px] font-bold text-emerald-600 uppercase block">ระยะที่วิ่งได้ประมาณ</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black text-slate-800" id="est-range">--</span>
                    <span class="text-[8px] text-slate-400 uppercase">km</span>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Middle Stats -->
    <div class="map-overlay bottom-[120px] px-4 space-y-2">
        <div id="history-preview" class="glass-ui interactable rounded-2xl p-3 shadow-xl max-h-[140px] overflow-y-auto no-scrollbar">
            <div class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2 flex justify-between">
                <span>ประวัติล่าสุด</span>
                <span id="record-count" class="text-blue-600">0 รายการ</span>
            </div>
            <div id="history-list" class="space-y-2">
                <div class="text-[10px] text-slate-400 text-center py-2">ยังไม่มีข้อมูลบันทึก</div>
            </div>
        </div>

        <div class="glass-ui interactable grid grid-cols-3 gap-2 px-4 py-3 rounded-3xl shadow-2xl">
            <div class="text-center border-r border-slate-200">
                <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">฿ / KM</div>
                <div class="text-sm font-bold text-blue-600" id="avg-cost">0.00</div>
            </div>
            <div class="text-center border-r border-slate-200">
                <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">ล่าสุด (ลิตร)</div>
                <div class="text-sm font-bold text-blue-600" id="gas-remain">0.0</div>
            </div>
            <div class="text-center">
                <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">ทริปล่าสุด</div>
                <div class="text-sm font-bold text-blue-600" id="trip-dist">0</div>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Action Buttons -->
    <div class="map-overlay bottom-0 p-6 flex justify-between items-center safe-bottom">
        <button onclick="saveCurrentLocationManual()" class="interactable bg-blue-600 text-white p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
            <i data-lucide="map-pin" class="w-6 h-6"></i>
        </button>
        <button onclick="toggleForm()" class="interactable bg-emerald-600 text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 active:scale-95">
            <i data-lucide="plus" class="w-5 h-5"></i> บันทึกเติมแก๊ส
        </button>
    </div>

    <!-- Slide Up Form -->
    <div id="form-panel" class="fixed inset-x-0 bottom-0 z-[2001] bg-white translate-y-full transition-transform duration-500 rounded-t-[3rem] p-8 border-t border-slate-200 shadow-[0_-10px_40px_rgba(0,0,0,0.1)] interactable safe-bottom">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-6" onclick="toggleForm()"></div>
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="fuel" class="text-orange-500"></i> <span id="form-title">บันทึกการเติมแก๊ส</span>
            </h3>
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-bold text-slate-400 uppercase">เติมเต็มถัง</span>
                <label class="switch">
                    <input type="checkbox" id="input-is-full">
                    <span class="slider"></span>
                </label>
            </div>
        </div>
        
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-tight">เลขไมล์ล่าสุด (กม.)</label>
                <input type="number" id="input-odometer" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-800 font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="0">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-tight">ราคา LPG / ลิตร</label>
                <input type="number" step="0.01" id="input-price-per-liter" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-800 font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="15.50">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-tight">จำนวนเงิน (บาท)</label>
                <input type="number" id="input-amount" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-slate-800 font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="0">
            </div>
            <div class="space-y-1 opacity-60">
                <label class="text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-tight">จำนวนลิตรที่เติม</label>
                <input type="number" id="input-liters" class="w-full bg-slate-100 border-0 rounded-2xl p-4 text-slate-500 font-bold" readonly>
            </div>
        </div>
        
        <div id="edit-id-store" class="hidden"></div>
        <button id="btn-save" onclick="addRefillRecord()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-xl active:bg-blue-700 transition-colors">ยืนยันบันทึกข้อมูล</button>
        <button onclick="toggleForm()" class="w-full text-slate-400 font-bold py-4">ยกเลิก</button>
    </div>

    <script type="module">
        // --- State Management ---
        let records = JSON.parse(localStorage.getItem('lpg_records_pro')) || [];
        let stations = JSON.parse(localStorage.getItem('lpg_stations_pro')) || [];
        let map, userMarker, tempMarker;
        let currentPos = [13.7563, 100.5018];
        let isFormOpen = false;
        const TANK_CAPACITY = 54; // ความจุถังประมาณ 54 ลิตร

        // --- Global Functions ---
        window.toggleForm = (isEdit = false) => {
            const panel = document.getElementById('form-panel');
            if (!isEdit) {
                // Reset form if not editing
                document.getElementById('form-title').innerText = "บันทึกการเติมแก๊ส";
                document.getElementById('btn-save').innerText = "ยืนยันบันทึกข้อมูล";
                document.getElementById('edit-id-store').innerText = "";
                document.getElementById('input-odometer').value = "";
                document.getElementById('input-amount').value = "";
                document.getElementById('input-price-per-liter').value = records.length > 0 ? records[0].price : "";
                document.getElementById('input-is-full').checked = false;
            }
            isFormOpen = !isFormOpen;
            panel.style.transform = isFormOpen ? 'translateY(0)' : 'translateY(100%)';
        };

        window.showSearchPanel = () => {
            document.getElementById('search-panel').classList.remove('hidden');
            updateSearchResults();
        };

        window.closeSearchPanel = () => document.getElementById('search-panel').classList.add('hidden');

        window.openGoogleMapsSearch = () => {
            window.open(`https://www.google.com/maps/search/LPG+station/@${currentPos[0]},${currentPos[1]},14z`, '_blank');
        };

        window.editRecord = (id) => {
            const record = records.find(r => r.id === id);
            if (!record) return;
            
            document.getElementById('form-title').innerText = "แก้ไขข้อมูลการเติม";
            document.getElementById('btn-save').innerText = "บันทึกการแก้ไข";
            document.getElementById('edit-id-store').innerText = id;
            document.getElementById('input-odometer').value = record.odo;
            document.getElementById('input-amount').value = record.amt;
            document.getElementById('input-price-per-liter').value = record.price;
            document.getElementById('input-is-full').checked = record.isFull || false;
            
            // Trigger liter calculation
            const liters = record.amt / record.price;
            document.getElementById('input-liters').value = liters.toFixed(2);
            
            toggleForm(true);
        };

        window.addRefillRecord = () => {
            const odoInput = document.getElementById('input-odometer');
            const amtInput = document.getElementById('input-amount');
            const priceInput = document.getElementById('input-price-per-liter');
            const isFull = document.getElementById('input-is-full').checked;
            const editId = document.getElementById('edit-id-store').innerText;

            const odo = parseFloat(odoInput.value);
            const amt = parseFloat(amtInput.value);
            const price = parseFloat(priceInput.value);
            const liters = price > 0 ? amt / price : 0;

            if (!odo || !amt || !price) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วน");
                return;
            }

            if (editId) {
                // Update mode
                const index = records.findIndex(r => r.id == editId);
                if (index !== -1) {
                    records[index] = { ...records[index], odo, amt, liters, price, isFull };
                }
            } else {
                // Create mode
                const newRecord = { id: Date.now(), odo, amt, liters, price, isFull, timestamp: Date.now() };
                records.unshift(newRecord);
                
                // ปักหมุดปั๊มอัตโนมัติในพิกัดปัจจุบัน
                const newStation = { lat: currentPos[0], lng: currentPos[1], timestamp: Date.now() };
                stations.push(newStation);
                localStorage.setItem('lpg_stations_pro', JSON.stringify(stations));
            }
            
            localStorage.setItem('lpg_records_pro', JSON.stringify(records));
            updateUI();
            updateMapMarkers();
            toggleForm();
            alert("บันทึกข้อมูลเรียบร้อยแล้ว");
        };

        window.saveCurrentLocationManual = () => {
            const newStation = { lat: currentPos[0], lng: currentPos[1], timestamp: Date.now() };
            stations.push(newStation);
            localStorage.setItem('lpg_stations_pro', JSON.stringify(stations));
            updateMapMarkers();
            alert("บันทึกพิกัดปั๊มปัจจุบันเรียบร้อยแล้ว");
        };

        window.savePinFromMap = (lat, lng) => {
            const newStation = { lat, lng, timestamp: Date.now() };
            stations.push(newStation);
            localStorage.setItem('lpg_stations_pro', JSON.stringify(stations));
            updateMapMarkers();
            map.closePopup();
            alert("เพิ่มปั๊มใหม่จากแผนที่เรียบร้อย");
        };

        // --- Core Functions ---
        function initMap() {
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                touchZoom: true
            }).setView(currentPos, 15);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            const userIcon = L.divIcon({ className: 'user-dot', iconSize: [16, 16] });
            userMarker = L.marker(currentPos, { icon: userIcon }).addTo(map);
            
            // จิ้มแผนที่เพื่อเลือกตำแหน่งปั๊ม
            map.on('click', function(e) {
                const { lat, lng } = e.latlng;
                const popupContent = `
                    <div class="p-2 text-center">
                        <p class="text-xs font-bold mb-2">เพิ่มปั๊ม LPG ที่จุดนี้?</p>
                        <button onclick="savePinFromMap(${lat}, ${lng})" class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-bold">บันทึกตำแหน่งนี้</button>
                    </div>
                `;
                L.popup().setLatLng(e.latlng).setContent(popupContent).openOn(map);
            });

            updateMapMarkers();
        }

        function updateMapMarkers() {
            if (!map) return;
            // Clear existing markers (Simple way for small app)
            stations.forEach(s => {
                L.circleMarker([s.lat, s.lng], { 
                    radius: 7, 
                    fillColor: "#ef4444", 
                    color: "#fff", 
                    weight: 2, 
                    fillOpacity: 1 
                }).addTo(map);
            });
        }

        function startTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition((pos) => {
                currentPos = [pos.coords.latitude, pos.coords.longitude];
                const speed = pos.coords.speed && pos.coords.speed > 0 ? Math.round(pos.coords.speed * 3.6) : 0;
                document.getElementById('current-speed').innerText = speed;
                if (userMarker) userMarker.setLatLng(currentPos);
                if (!isFormOpen && map) map.panTo(currentPos);
                updateUI();
            }, null, { enableHighAccuracy: true });
        }

        function updateUI() {
            const historyList = document.getElementById('history-list');
            const countLabel = document.getElementById('record-count');
            countLabel.innerText = `${records.length} รายการ`;

            if (records.length === 0) {
                historyList.innerHTML = `<div class="text-[10px] text-slate-400 text-center py-2">ยังไม่มีข้อมูลบันทึก</div>`;
                return;
            }

            // Calculation Logic
            const latest = records[0];
            document.getElementById('gas-remain').innerText = latest.liters.toFixed(1);

            if (records.length >= 2) {
                // Calculate distance between two fills
                const trip = records[0].odo - records[1].odo;
                const costKm = records[0].amt / trip;
                const kmL = trip / records[0].liters;
                
                document.getElementById('avg-cost').innerText = costKm.toFixed(2);
                document.getElementById('trip-dist').innerText = trip;

                // Range prediction logic (More accurate if full tank is known)
                let efficiency = kmL;
                if (records[0].isFull) {
                    // If last was full, current efficiency is more reliable
                    efficiency = kmL; 
                }
                document.getElementById('est-range').innerText = (latest.liters * efficiency).toFixed(0);
            }

            historyList.innerHTML = records.slice(0, 5).map(r => `
                <div class="flex justify-between items-center bg-white p-2 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex-1">
                        <div class="flex items-center gap-1">
                            <span class="text-[10px] font-bold text-slate-700">${new Date(r.timestamp).toLocaleDateString('th-TH')}</span>
                            ${r.isFull ? '<span class="text-[8px] bg-emerald-100 text-emerald-600 px-1 rounded">เต็มถัง</span>' : ''}
                        </div>
                        <div class="text-[8px] text-slate-400">เลขไมล์: ${r.odo.toLocaleString()} กม.</div>
                    </div>
                    <div class="text-right mr-3">
                        <div class="text-[10px] font-bold text-blue-600">${r.amt} ฿</div>
                        <div class="text-[8px] text-slate-400">${r.liters.toFixed(2)} ลิตร</div>
                    </div>
                    <button onclick="editRecord(${r.id})" class="p-2 text-slate-300 hover:text-blue-500 transition-colors">
                        <i data-lucide="edit-3" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.updateSearchResults = () => {
            const list = document.getElementById('search-results-list');
            if (stations.length === 0) {
                list.innerHTML = `<div class="text-center py-4 text-xs text-slate-400">ไม่พบปั๊มที่บันทึกไว้</div>`;
                return;
            }
            list.innerHTML = stations.slice(-10).reverse().map(s => `
                <div class="bg-white p-3 rounded-xl flex justify-between items-center border border-slate-100 active:bg-slate-50 shadow-sm" 
                     onclick="map.flyTo([${s.lat}, ${s.lng}], 17); closeSearchPanel();">
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4 text-red-500"></i>
                        <span class="text-xs text-slate-700">พิกัดปั๊มที่บันทึกไว้</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-300"></i>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.onload = () => {
            lucide.createIcons();
            initMap();
            startTracking();
            updateUI();
            
            const amtInp = document.getElementById('input-amount');
            const priceInp = document.getElementById('input-price-per-liter');
            const literInp = document.getElementById('input-liters');
            const calcLiters = () => {
                const a = parseFloat(amtInp.value);
                const p = parseFloat(priceInp.value);
                literInp.value = (a && p && p > 0) ? (a / p).toFixed(2) : '0.00';
            };
            amtInp.addEventListener('input', calcLiters);
            priceInp.addEventListener('input', calcLiters);
        };
    </script>
</body>
</html>
