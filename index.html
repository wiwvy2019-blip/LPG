<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LPG Insight Cloud Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3b82f6">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        
        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            background-color: #f1f5f9; overflow: hidden; position: fixed; 
        }
        body { font-family: 'Kanit', sans-serif; color: #1e293b; }
        
        #map { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: 1; background: #cbd5e1;
        }

        .map-overlay { position: absolute; z-index: 1000; pointer-events: none; width: 100%; }
        .interactable { pointer-events: auto; }
        .glass-ui { background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        
        .car-marker { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 22px solid #3b82f6; filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.8)); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-bottom { padding-bottom: calc(0.3rem + env(safe-area-inset-bottom)); }
        .safe-top { padding-top: calc(0.5rem + env(safe-area-inset-top)); }
        
        .pump-marker { background: #ef4444; border: 2px solid white; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }

        .map-crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 999; pointer-events: none; display: flex; align-items: center; justify-content: center;
        }
        .crosshair-dot { width: 4px; height: 4px; background: #ef4444; border-radius: 50%; border: 1px solid white; }
        .crosshair-line-h { width: 24px; height: 1px; background: rgba(239, 68, 68, 0.4); position: absolute; }
        .crosshair-line-v { width: 1px; height: 24px; background: rgba(239, 68, 68, 0.4); position: absolute; }

        #history-panel { 
            position: absolute; bottom: 80px; left: 12px; right: 12px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            max-height: 0; opacity: 0; pointer-events: none;
            z-index: 1001;
        }
        #history-panel.open { max-height: 220px; opacity: 1; pointer-events: auto; }
        
        .btn-circle-sm { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; }
    </style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-rotate@0.2.8/dist/leaflet-rotate.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="map"></div>
    <div class="map-crosshair"><div class="crosshair-line-h"></div><div class="crosshair-line-v"></div><div class="crosshair-dot"></div></div>

    <!-- ส่วนบน: Dashboard ความเร็ว และ เฉลี่ย (วงสีแดง) -->
    <div class="map-overlay top-0 left-0 right-0 safe-top px-4 flex justify-between items-start pointer-events-none">
        <div class="flex gap-1.5">
            <div class="glass-ui interactable p-1.5 px-2.5 rounded-xl shadow-md border-l-4 border-blue-600">
                <span class="text-[6px] font-bold text-blue-600 uppercase block tracking-tighter">ความเร็ว</span>
                <div class="flex items-baseline gap-0.5 leading-none">
                    <span class="text-lg font-black text-slate-800" id="current-speed">0</span>
                    <span class="text-[7px] text-slate-400 font-bold">KM/H</span>
                </div>
            </div>
            
            <div class="glass-ui interactable p-1.5 px-2.5 rounded-xl shadow-md border-l-4 border-emerald-600">
                <div class="flex items-center gap-1.5">
                    <span class="text-[6px] font-bold text-emerald-600 uppercase block">เฉลี่ยสะสม</span>
                    <select id="metric-mode" onchange="window.updateUI()" class="text-[6px] bg-slate-100 rounded px-0.5 outline-none">
                        <option value="kml">กม./ลิตร</option>
                        <option value="bkm">บาท/กม.</option>
                    </select>
                </div>
                <div class="flex items-baseline gap-0.5 mt-0.5 leading-none">
                    <span class="text-lg font-black text-slate-800" id="top-consumption-val">--</span>
                    <span class="text-[7px] text-slate-400 font-bold uppercase" id="top-consumption-unit">KM/L</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ปุ่มตำแหน่งขวา -->
    <div class="map-overlay top-[75px] right-4 flex flex-col gap-2 items-end">
        <button onclick="window.locateMe()" class="interactable glass-ui btn-circle-sm rounded-full shadow-lg active:scale-90 transition-transform">
            <i data-lucide="crosshair" class="w-4 h-4 text-blue-600"></i>
        </button>
        <button onclick="window.saveStationAtCenter()" class="interactable glass-ui btn-circle-sm rounded-full shadow-lg active:scale-90 transition-transform border-emerald-200">
            <i data-lucide="map-pin-plus" class="w-4 h-4 text-emerald-600"></i>
        </button>
    </div>

    <!-- History Panel -->
    <div id="history-panel" class="glass-ui rounded-2xl shadow-2xl overflow-hidden border border-white">
        <div class="p-2 border-b border-slate-100 flex justify-between items-center px-4 bg-white/50">
            <span class="text-[8px] font-bold text-slate-500 uppercase tracking-widest">ประวัติการเติม</span>
            <button onclick="window.toggleHistory()" class="text-slate-400"><i data-lucide="x" class="w-3.5 h-3.5"></i></button>
        </div>
        <div id="history-container" class="max-h-[160px] overflow-y-auto p-2 no-scrollbar"></div>
    </div>

    <!-- แถบเครื่องมือรวมล่าง -->
    <div class="map-overlay bottom-0 p-3 px-3 safe-bottom">
        <div class="glass-ui p-2 rounded-2xl flex items-center shadow-2xl interactable border border-blue-100 px-3">
            
            <!-- ส่วนที่ 1: ปุ่มประวัติ (ซ้าย) -->
            <button onclick="window.toggleHistory()" class="flex flex-col items-center justify-center p-1.5 px-2 rounded-xl active:scale-90 transition-all opacity-80 border border-slate-100 mr-2">
                <i data-lucide="history" class="w-4 h-4 text-slate-500"></i>
                <span class="text-[5px] font-bold text-slate-500 uppercase">ประวัติ</span>
            </button>

            <!-- ส่วนที่ 2: ข้อมูลหลักกึ่งกลาง (เน้นตัวเลขใหญ่ชัดเจน) -->
            <div class="flex items-center justify-center gap-4 flex-grow border-x border-slate-100 px-2">
                <div class="flex flex-col items-center">
                    <span class="text-[6px] font-bold text-slate-400 uppercase tracking-tighter leading-none mb-1">ทริป GPS</span>
                    <div class="flex items-baseline gap-0.5">
                        <span class="text-xl font-black text-blue-700 leading-none" id="gps-trip-dist">0.00</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase">km</span>
                    </div>
                </div>
                <div class="flex flex-col items-center">
                    <!-- ส่วนสิ้นเปลืองด้านล่างที่จะเปลี่ยนตาม Metric ด้านบน -->
                    <span class="text-[6px] font-bold text-emerald-600 uppercase tracking-tighter leading-none mb-1" id="bottom-label">เฉลี่ย กม./ลิตร</span>
                    <div class="flex items-baseline gap-0.5">
                        <span class="text-xl font-black text-slate-900 leading-none" id="bottom-consumption-val">--</span>
                        <span class="text-[8px] font-bold text-slate-400 uppercase" id="bottom-consumption-unit">KM/L</span>
                    </div>
                </div>
            </div>

            <!-- ส่วนที่ 3: สถานะแก๊สและปุ่มเพิ่ม (ขวา) -->
            <div class="flex items-center gap-2 ml-2">
                <div class="flex flex-col text-right">
                    <span class="text-[6px] text-slate-400 font-bold uppercase leading-none mb-1">แก๊ส</span>
                    <div class="flex items-baseline gap-0.5">
                        <span class="text-sm font-black text-blue-600 leading-none" id="gas-remain">0.0</span>
                        <span class="text-[8px] font-bold text-blue-400">L</span>
                    </div>
                </div>
                <button onclick="window.toggleForm()" class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- ฟอร์มกรอกข้อมูล -->
    <div id="form-panel" class="fixed inset-x-0 bottom-0 z-[2001] bg-white translate-y-full transition-transform duration-500 rounded-t-[2.5rem] p-6 shadow-2xl interactable safe-bottom">
        <div class="w-10 h-1 bg-slate-200 rounded-full mx-auto mb-5" onclick="window.toggleForm()"></div>
        <div class="flex justify-between items-center mb-5">
            <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                <i data-lucide="fuel" class="text-orange-500"></i> <span id="form-title">บันทึกการเติม</span>
            </h3>
            <label class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl cursor-pointer">
                <span class="text-[9px] font-bold text-slate-500 uppercase">เติมเต็มถัง</span>
                <input type="checkbox" id="input-is-full" class="w-4 h-4 text-blue-600 rounded">
            </label>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="space-y-1">
                <label class="text-[8px] font-bold text-slate-400 uppercase ml-1">เลขไมล์</label>
                <input type="number" id="input-odometer" class="w-full bg-slate-50 border-0 rounded-xl p-3.5 text-slate-800 font-bold text-sm" placeholder="0">
            </div>
            <div class="space-y-1">
                <label class="text-[8px] font-bold text-slate-400 uppercase ml-1">ราคา/ลิตร</label>
                <input type="number" step="0.01" id="input-price-per-liter" class="w-full bg-slate-50 border-0 rounded-xl p-3.5 text-slate-800 font-bold text-sm" placeholder="0.00">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="space-y-1">
                <label class="text-[8px] font-bold text-slate-400 uppercase ml-1">จำนวนเงิน</label>
                <input type="number" id="input-amount" class="w-full bg-slate-50 border-0 rounded-xl p-3.5 text-slate-800 font-bold text-sm" placeholder="0">
            </div>
            <div class="space-y-1 opacity-60">
                <label class="text-[8px] font-bold text-slate-400 uppercase ml-1">ลิตร</label>
                <input type="number" id="input-liters" class="w-full bg-slate-100 border-0 rounded-xl p-3.5 text-slate-400 font-bold text-sm" readonly placeholder="0.00">
            </div>
        </div>
        <input type="hidden" id="edit-id-store">
        <button id="save-button" onclick="window.addRefillRecord()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-sm shadow-xl active:bg-blue-700">ยืนยันบันทึก</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, currentUser;
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lpg-pro-cloud-v3';

        let records = JSON.parse(localStorage.getItem('lpg_records') || '[]');
        let stations = JSON.parse(localStorage.getItem('lpg_stations') || '[]');
        let map, userMarker, tripPoints = [];
        let currentPos = [13.7563, 100.5018];
        let tripDistance = parseFloat(localStorage.getItem('gps_trip_dist')) || 0;

        onAuthStateChanged(auth, (u) => {
            currentUser = u;
            if (currentUser) {
                onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'refills'), (snap) => {
                    const cloudRecords = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    if (cloudRecords.length > 0) {
                        records = cloudRecords.sort((a,b) => b.timestamp - a.timestamp);
                        localStorage.setItem('lpg_records', JSON.stringify(records));
                        window.updateUI();
                    }
                });
                onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'stations'), (snap) => {
                    stations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    localStorage.setItem('lpg_stations', JSON.stringify(stations));
                    window.renderStations();
                });
            } else {
                signInAnonymously(auth);
            }
        });

        window.locateMe = () => { if (map) map.flyTo(currentPos, 16, { duration: 1 }); };

        window.saveStationAtCenter = async () => {
            if (!map) return;
            const center = map.getCenter();
            const newStation = { lat: center.lat, lng: center.lng, timestamp: Date.now() };
            stations.push(newStation);
            localStorage.setItem('lpg_stations', JSON.stringify(stations));
            window.renderStations();
            if (db && currentUser) try { await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'stations'), newStation); } catch (e) {}
        };

        window.renderStations = () => {
            if (!map) return;
            map.eachLayer(l => { if (l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            stations.forEach(s => {
                if (s.lat && s.lng) {
                    const marker = L.marker([s.lat, s.lng], { 
                        icon: L.divIcon({ className: 'pump-marker', html: '<i data-lucide="fuel" class="w-3 h-3"></i>', iconSize: [20, 20] }) 
                    }).addTo(map);
                    marker.on('click', (e) => {
                        const menu = document.createElement('div');
                        menu.className = 'glass-ui interactable p-2 rounded-xl flex flex-col gap-1 shadow-2xl border-blue-100 min-w-[100px]';
                        menu.innerHTML = `<button id="del-btn" class="text-[9px] font-bold text-red-500">ลบพิกัด</button>`;
                        const popup = L.popup({ closeButton: false }).setLatLng(e.latlng).setContent(menu).openOn(map);
                        menu.querySelector('#del-btn').onclick = async () => {
                            stations = stations.filter(st => st.timestamp !== s.timestamp);
                            localStorage.setItem('lpg_stations', JSON.stringify(stations));
                            window.renderStations();
                            if (db && currentUser && s.id) await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'stations', s.id));
                            map.closePopup();
                        };
                    });
                }
            });
            lucide.createIcons();
        };

        window.toggleHistory = () => {
            const panel = document.getElementById('history-panel');
            panel.classList.toggle('open');
        };
        
        window.toggleForm = (editId = null) => {
            const panel = document.getElementById('form-panel');
            if (editId) {
                const r = records.find(x => x.id === editId);
                document.getElementById('form-title').innerText = "แก้ไขประวัติ";
                document.getElementById('edit-id-store').value = editId;
                document.getElementById('input-odometer').value = r.odo;
                document.getElementById('input-amount').value = r.amt;
                document.getElementById('input-price-per-liter').value = r.price;
                document.getElementById('input-is-full').checked = r.isFull;
            } else {
                document.getElementById('form-title').innerText = "บันทึกข้อมูลการเติม";
                document.getElementById('edit-id-store').value = "";
                document.getElementById('input-odometer').value = "";
                document.getElementById('input-amount').value = "";
                document.getElementById('input-price-per-liter').value = records[0]?.price || "15.50";
                document.getElementById('input-is-full').checked = false;
            }
            isFormOpen = !isFormOpen;
            panel.style.transform = isFormOpen ? 'translateY(0)' : 'translateY(100%)';
        };

        window.addRefillRecord = async () => {
            const odo = parseFloat(document.getElementById('input-odometer').value);
            const amt = parseFloat(document.getElementById('input-amount').value);
            const price = parseFloat(document.getElementById('input-price-per-liter').value);
            const isFull = document.getElementById('input-is-full').checked;
            const editId = document.getElementById('edit-id-store').value;
            if (isNaN(odo) || isNaN(amt) || isNaN(price)) return;
            const center = map.getCenter();
            const refillData = { odo, amt, price, isFull, lat: center.lat, lng: center.lng, timestamp: Date.now() };
            if (editId) {
                const idx = records.findIndex(r => r.id === editId);
                if (idx !== -1) { refillData.timestamp = records[idx].timestamp; records[idx] = { ...records[idx], ...refillData }; }
            } else { refillData.id = 'local-' + Date.now(); records.unshift(refillData); }
            localStorage.setItem('lpg_records', JSON.stringify(records));
            window.updateUI(); window.toggleForm();
            if (db && currentUser) {
                if (editId && !editId.startsWith('local-')) await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'refills', editId), refillData);
                else {
                    const clean = {...refillData}; delete clean.id;
                    await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'refills'), clean);
                    await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'stations'), { lat: center.lat, lng: center.lng, timestamp: Date.now() });
                }
            }
        };

        window.updateUI = () => {
            const container = document.getElementById('history-container');
            const mode = document.getElementById('metric-mode').value;
            
            if (records.length === 0) {
                container.innerHTML = '<div class="text-[8px] text-slate-400 text-center py-2">ไม่มีข้อมูล</div>';
                return;
            }

            container.innerHTML = records.slice(0, 8).map(r => `
                <div onclick="window.toggleForm('${r.id}')" class="bg-white/80 p-2 rounded-xl mb-1 flex justify-between items-center shadow-sm">
                    <div class="text-[10px] font-bold text-slate-800">${r.odo.toLocaleString()} กม. <span class="text-[7px] text-slate-400 font-normal">(${new Date(r.timestamp).toLocaleDateString('th-TH')})</span></div>
                    <div class="text-[10px] font-bold text-blue-600">${r.amt} ฿</div>
                </div>
            `).join('');

            // --- คำนวณค่าเฉลี่ยสะสม ---
            const latest = records[0];
            const oldest = records[records.length - 1];
            let accKmL = 0, accBkm = 0;

            if (records.length >= 2) {
                const totalDist = latest.odo - oldest.odo;
                let totalLiters = 0, totalCost = 0;
                
                // รวมสะสมทิ้งหมด ยกเว้นครั้งแรกสุดที่เป็น baseline
                for (let i = 0; i < records.length - 1; i++) {
                    totalLiters += (records[i].amt / records[i].price);
                    totalCost += records[i].amt;
                }

                if (totalDist > 0) {
                    accKmL = totalDist / totalLiters;
                    accBkm = totalCost / totalDist;
                }
            }

            // แสดงผลส่วนบน (Dashboard)
            document.getElementById('top-consumption-val').innerText = (mode === 'kml') ? (accKmL > 0 ? accKmL.toFixed(1) : "--") : (accBkm > 0 ? accBkm.toFixed(2) : "--");
            document.getElementById('top-consumption-unit').innerText = (mode === 'kml') ? "KM/L" : "฿/KM";

            // แสดงผลส่วนล่าง (Toolbar)
            const bottomLabel = document.getElementById('bottom-label');
            const bottomVal = document.getElementById('bottom-consumption-val');
            const bottomUnit = document.getElementById('bottom-consumption-unit');

            if (mode === 'kml') {
                bottomLabel.innerText = "เฉลี่ย กม./ลิตร";
                bottomVal.innerText = accKmL > 0 ? accKmL.toFixed(1) : "--";
                bottomUnit.innerText = "KM/L";
            } else {
                bottomLabel.innerText = "เฉลี่ย บาท/กม.";
                bottomVal.innerText = accBkm > 0 ? accBkm.toFixed(2) : "--";
                bottomUnit.innerText = "฿/KM";
            }

            // แก๊สคงเหลือ
            let curLiters = latest.isFull ? 54 : (latest.amt / latest.price);
            document.getElementById('gas-remain').innerText = curLiters.toFixed(1);
            lucide.createIcons();
        };

        window.resetTrip = () => { tripDistance = 0; localStorage.setItem('gps_trip_dist', 0); window.updateUI(); };

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false, rotate: true }).setView(currentPos, 16);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 }).addTo(map);
            userMarker = L.marker(currentPos, { icon: L.divIcon({ className: 'car-marker', iconSize: [14, 18], iconAnchor: [7, 9] }) }).addTo(map);
            [500, 2000, 5000].forEach(t => setTimeout(() => map.invalidateSize(), t));
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; const dLat = (lat2-lat1)*Math.PI/180; const dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function startTracking() {
            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, speed, heading } = pos.coords;
                if (tripPoints.length > 0) {
                    const last = tripPoints[tripPoints.length - 1];
                    const d = calculateDistance(last[0], last[1], latitude, longitude);
                    if (d > 0.002) { tripDistance += d; localStorage.setItem('gps_trip_dist', tripDistance); }
                }
                tripPoints.push([latitude, longitude]); if (tripPoints.length > 5) tripPoints.shift();
                currentPos = [latitude, longitude];
                document.getElementById('current-speed').innerText = speed > 0 ? Math.round(speed * 3.6) : 0;
                document.getElementById('gps-trip-dist').innerText = tripDistance.toFixed(2);
                if (userMarker) userMarker.setLatLng(currentPos);
                if (!isFormOpen && map && speed > 2) { map.setBearing(heading || 0); map.panTo(currentPos); }
                window.updateUI();
            }, null, { enableHighAccuracy: true });
        }

        window.addEventListener('load', () => {
            initMap(); startTracking(); window.updateUI();
            const amt = document.getElementById('input-amount');
            const prc = document.getElementById('input-price-per-liter');
            const calc = () => document.getElementById('input-liters').value = (amt.value && prc.value) ? (amt.value / prc.value).toFixed(2) : '0.00';
            amt.addEventListener('input', calc); prc.addEventListener('input', calc);
            window.addEventListener('resize', () => { if(map) map.invalidateSize(); });
        });
    </script>
</body>
</html>
