<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LPG Insight Cloud Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            background-color: #0f172a; overflow: hidden; position: fixed; 
            font-family: 'Kanit', sans-serif;
        }
        
        #map { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: 1; background: #1e293b;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
        }

        .car-marker {
            width: 32px; height: 32px;
            background: #2563eb;
            border: 4px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
        }

        .pump-marker {
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .range-bar { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .range-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.5s ease; }

        .leaflet-popup-content-wrapper {
            border-radius: 20px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="map"></div>

    <!-- UI Overlay: Top Stats -->
    <div class="fixed top-0 left-0 right-0 z-[1000] p-4 pt-[calc(1.5rem+env(safe-area-inset-top))] flex justify-between items-start pointer-events-none">
        <div class="flex flex-col gap-3">
            <div class="glass-panel pointer-events-auto p-4 rounded-3xl flex items-center gap-4">
                <div class="bg-blue-600 p-3 rounded-2xl text-white shadow-lg shadow-blue-200">
                    <i data-lucide="gauge" class="w-8 h-8"></i>
                </div>
                <div>
                    <span class="text-[15px] font-bold text-slate-500 uppercase tracking-wider block leading-none mb-1">ความเร็ว</span>
                    <div class="flex items-baseline gap-1">
                        <span id="display-speed" class="text-5xl font-black text-slate-800 leading-none">0</span>
                        <span class="text-lg font-bold text-slate-400">กม./ชม.</span>
                    </div>
                </div>
            </div>

            <!-- Range Widget -->
            <div class="glass-panel pointer-events-auto p-4 rounded-3xl flex items-center gap-4 border-l-8 border-blue-500">
                <div class="bg-slate-100 p-3 rounded-2xl text-blue-600">
                    <i data-lucide="zap" class="w-8 h-8"></i>
                </div>
                <div>
                    <span class="text-[15px] font-bold text-slate-500 uppercase tracking-wider block leading-none mb-1">ระยะที่วิ่งได้</span>
                    <div class="flex items-baseline gap-1">
                        <span id="display-range" class="text-5xl font-black text-blue-600 leading-none">0</span>
                        <span class="text-lg font-bold text-slate-400">กม.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-3 items-end">
            <div class="glass-panel pointer-events-auto p-4 rounded-3xl min-w-[160px]">
                <div class="flex items-center justify-between gap-3 mb-2">
                    <span class="text-[15px] font-bold text-emerald-600 uppercase tracking-wider">ประสิทธิภาพ</span>
                    <select id="metric-mode" onchange="updateUI()" class="text-[12px] bg-slate-100 rounded-lg px-2 py-1 outline-none border-none font-bold">
                        <option value="kml">กม./ลิตร</option>
                        <option value="bkm">บาท/กม.</option>
                    </select>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="display-avg" class="text-5xl font-black text-slate-800 leading-none">--</span>
                    <span id="display-unit" class="text-lg font-bold text-slate-400 uppercase tracking-tighter">KM/L</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Map Controls -->
    <div class="fixed right-4 top-1/2 -translate-y-1/2 z-[1000] flex flex-col gap-4">
        <button onclick="locateMe()" class="w-16 h-16 glass-panel rounded-full flex items-center justify-center text-blue-600 shadow-xl active:scale-90 transition-transform">
            <i data-lucide="navigation" class="w-8 h-8"></i>
        </button>
        <button onclick="saveStation()" class="w-16 h-16 glass-panel rounded-full flex items-center justify-center text-emerald-600 shadow-xl active:scale-90 transition-transform">
            <i data-lucide="map-pin-plus" class="w-8 h-8"></i>
        </button>
    </div>

    <!-- History Panel -->
    <div id="history-drawer" class="fixed inset-x-0 bottom-0 z-[2000] translate-y-full transition-transform duration-500 ease-out">
        <div class="glass-panel rounded-t-[3.5rem] p-8 shadow-2xl max-h-[85vh] overflow-hidden flex flex-col">
            <div class="w-16 h-2 bg-slate-300 rounded-full mx-auto mb-8 cursor-pointer" onclick="toggleHistory()"></div>
            <div class="flex justify-between items-center mb-8 px-2">
                <h3 class="text-3xl font-bold text-slate-800">ประวัติการเติม</h3>
                <button onclick="exportData()" class="text-blue-600 text-sm font-bold flex items-center gap-2 bg-blue-50 px-5 py-2.5 rounded-full">
                    <i data-lucide="download" class="w-5 h-5"></i> ส่งออก
                </button>
            </div>
            <div id="history-list" class="flex-grow overflow-y-auto space-y-4 no-scrollbar pb-16"></div>
        </div>
    </div>

    <!-- Main Control Bar -->
    <div class="fixed bottom-0 left-0 right-0 z-[1001] p-6 pb-[calc(1.5rem+env(safe-area-inset-bottom))]">
        <div class="glass-panel rounded-[3rem] p-6 flex items-center justify-between shadow-2xl border-t-2 border-white/50">
            <div class="flex-1">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-[15px] font-bold text-slate-500 uppercase tracking-widest leading-none">แก๊สในถัง</span>
                    <span id="gas-remain-val" class="text-2xl font-black text-blue-600 leading-none">0.0 L</span>
                </div>
                <div class="range-bar">
                    <div id="gas-range-fill" class="range-fill" style="width: 0%"></div>
                </div>
            </div>

            <div class="mx-8 relative">
                <button onclick="openForm()" class="w-24 h-24 bg-blue-600 text-white rounded-[2.5rem] flex items-center justify-center shadow-2xl shadow-blue-300 active:scale-90 transition-transform -mt-20 border-[6px] border-white">
                    <i data-lucide="plus" class="w-12 h-12"></i>
                </button>
            </div>

            <div class="flex-1 flex justify-end gap-6">
                <button onclick="toggleHistory()" class="flex flex-col items-center text-slate-400 hover:text-blue-600 transition-colors">
                    <i data-lucide="calendar-days" class="w-10 h-10"></i>
                    <span class="text-[12px] font-bold uppercase mt-1">ประวัติ</span>
                </button>
                <button onclick="resetTrip()" class="flex flex-col items-center text-slate-400 hover:text-red-600 transition-colors">
                    <i data-lucide="rotate-ccw" class="w-10 h-10"></i>
                    <span class="text-[12px] font-bold uppercase mt-1">รีเซ็ต</span>
                </button>
            </div>
        </div>
        
        <div class="absolute -top-8 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-3 rounded-full shadow-2xl flex items-center gap-3">
            <i data-lucide="milestone" class="w-5 h-5 text-blue-400"></i>
            <span class="text-[15px] font-bold tracking-widest uppercase">ทริป: <span id="display-trip" class="text-white text-xl ml-1">0.00</span> กม.</span>
        </div>
    </div>

    <!-- Form Modal -->
    <div id="form-modal" class="fixed inset-0 z-[3000] hidden">
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-md" onclick="closeForm()"></div>
        <div class="absolute inset-x-0 bottom-0 glass-panel rounded-t-[4rem] p-10 animate-slide-up">
            <div class="flex justify-between items-center mb-10">
                <div>
                    <h2 class="text-4xl font-bold text-slate-800" id="form-title">บันทึกข้อมูล</h2>
                    <p class="text-slate-500 text-xl">ระบุข้อมูลการเติมแก๊ส</p>
                </div>
                <button onclick="closeForm()" class="w-14 h-14 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">
                    <i data-lucide="x" class="w-10 h-10"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-5 mb-8">
                <div class="col-span-2">
                    <label class="text-[15px] font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-2">เลขไมล์รถยนต์ (ODO)</label>
                    <input type="number" id="inp-odo" class="w-full bg-slate-100/50 border-4 border-slate-200 rounded-3xl p-5 text-4xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-colors" placeholder="0">
                </div>
                <div>
                    <label class="text-[15px] font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-2">จำนวนเงิน (บาท)</label>
                    <input type="number" id="inp-cost" oninput="calculateLiters()" class="w-full bg-slate-100/50 border-4 border-slate-200 rounded-3xl p-5 text-4xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-colors" placeholder="0">
                </div>
                <div>
                    <label class="text-[15px] font-bold text-slate-500 uppercase tracking-widest mb-2 block ml-2">ราคา/ลิตร</label>
                    <input type="number" step="0.01" id="inp-price" oninput="calculateLiters()" class="w-full bg-slate-100/50 border-4 border-slate-200 rounded-3xl p-5 text-4xl font-bold text-slate-800 focus:border-blue-500 outline-none transition-colors" placeholder="0.00">
                </div>
                <div class="col-span-2">
                    <label class="text-[15px] font-bold text-blue-600 uppercase tracking-widest mb-2 block ml-2">ปริมาณที่เติม (ลิตร)</label>
                    <div class="relative">
                        <input type="text" id="inp-liters-display" readonly class="w-full bg-blue-100/30 border-4 border-blue-200 rounded-3xl p-5 text-4xl font-bold text-blue-700 outline-none" placeholder="0.00">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xl font-bold text-blue-400">ลิตร</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-6 mb-10 bg-blue-50 p-6 rounded-[2.5rem] border-2 border-blue-100">
                <input type="checkbox" id="inp-is-full" class="w-10 h-10 rounded-xl text-blue-600 border-4 border-blue-200">
                <label for="inp-is-full" class="font-bold text-blue-800 text-2xl">เติมเต็มถัง (เซ็ตเป็น 54 ลิตร)</label>
            </div>

            <button onclick="saveRecord()" class="w-full bg-blue-600 text-white py-6 rounded-3xl text-3xl font-bold shadow-2xl shadow-blue-200 active:bg-blue-700 transition-all flex items-center justify-center gap-4">
                <i data-lucide="check-circle" class="w-10 h-10"></i>
                ยืนยันบันทึก
            </button>
            <div class="h-8"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 z-[4000] opacity-0 transition-all duration-300 pointer-events-none">
        <div class="bg-slate-900 text-white px-10 py-5 rounded-3xl shadow-2xl flex items-center gap-4">
            <span id="toast-msg" class="text-xl font-bold"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        let db, auth, user;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lpg-insight-cloud-v3';
        let records = JSON.parse(localStorage.getItem('lpg_v3_records') || '[]');
        let stations = JSON.parse(localStorage.getItem('lpg_v3_stations') || '[]');
        let tripDistance = parseFloat(localStorage.getItem('lpg_v3_trip') || '0');
        let currentPos = [13.7563, 100.5018];
        let map, userMarker, pathLine;
        let isDrawerOpen = false;
        
        const TANK_CAPACITY = 54;
        let lastCalculatedRemainingLiters = 0;

        async function initFirebase() {
            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) syncCloudData();
                });
            } catch (e) { showToast("Offline Mode"); }
        }

        function syncCloudData() {
            if (!user || !db) return;
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'refills'), (snap) => {
                records = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.odo - a.odo);
                localStorage.setItem('lpg_v3_records', JSON.stringify(records));
                updateUI();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'stations'), (snap) => {
                stations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                localStorage.setItem('lpg_v3_stations', JSON.stringify(stations));
                renderStations();
            });
        }

        function initMap() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(currentPos, 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

            userMarker = L.marker(currentPos, { icon: L.divIcon({ className: 'car-marker' }) }).addTo(map);
            pathLine = L.polyline([], { color: '#2563eb', weight: 6, opacity: 0.4, dashArray: '8, 12' }).addTo(map);

            map.on('click', (e) => {
                const { lat, lng } = e.latlng;
                const content = document.createElement('div');
                content.className = 'p-3 text-center';
                content.innerHTML = `<p class="text-lg font-bold mb-4">ลงพิกัดปั๊มที่นี่?</p><button id="p-add" class="bg-blue-600 text-white text-sm px-6 py-3 rounded-full font-bold">ยืนยัน</button>`;
                L.popup().setLatLng(e.latlng).setContent(content).openOn(map);
                content.querySelector('#p-add').onclick = () => { saveStation(lat, lng); map.closePopup(); };
            });

            setTimeout(() => map.invalidateSize(), 500);
            renderStations();
        }

        window.locateMe = () => { if (map && currentPos) map.flyTo(currentPos, 17, { duration: 1.5 }); };

        window.saveStation = async (lat, lng) => {
            if (!user || !db) return;
            const targetLat = lat || map.getCenter().lat;
            const targetLng = lng || map.getCenter().lng;
            try { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'stations'), { lat: targetLat, lng: targetLng, timestamp: Date.now() }); showToast("บันทึกพิกัดปั๊มแล้ว"); } catch (e) {}
        };

        function renderStations() {
            if (!map) return;
            map.eachLayer(l => { if (l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            stations.forEach(s => {
                const marker = L.marker([s.lat, s.lng], { icon: L.divIcon({ className: 'pump-marker', html: '<i data-lucide="fuel" style="width:16px; height:16px"></i>', iconSize: [32, 32] }) }).addTo(map);
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    L.popup().setLatLng([s.lat, s.lng]).setContent(`<div class="p-3 text-center"><p class="text-lg font-bold mb-4">ลบพิกัดนี้?</p><button onclick="deleteStation('${s.id}')" class="bg-red-500 text-white text-sm px-6 py-2 rounded-full font-bold">ลบ</button></div>`).openOn(map);
                });
            });
            lucide.createIcons();
        }

        window.deleteStation = async (id) => { if (user && db) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'stations', id)); map.closePopup(); };

        function startTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                const d = calcDist(currentPos[0], currentPos[1], latitude, longitude);
                if (d > 0.005) {
                    tripDistance += d;
                    localStorage.setItem('lpg_v3_trip', tripDistance);
                    pathLine.addLatLng([latitude, longitude]);
                }
                currentPos = [latitude, longitude];
                userMarker.setLatLng(currentPos);
                document.getElementById('display-speed').innerText = speed > 0 ? Math.round(speed * 3.6) : 0;
                document.getElementById('display-trip').innerText = tripDistance.toFixed(2);
                updateUI();
            }, null, { enableHighAccuracy: true });
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        window.openForm = () => { document.getElementById('form-modal').classList.remove('hidden'); calculateLiters(); };
        window.closeForm = () => document.getElementById('form-modal').classList.add('hidden');
        window.toggleHistory = () => { isDrawerOpen = !isDrawerOpen; document.getElementById('history-drawer').style.transform = isDrawerOpen ? 'translateY(0)' : 'translateY(100%)'; };

        window.resetTrip = () => { tripDistance = 0; localStorage.setItem('lpg_v3_trip', 0); pathLine.setLatLngs([]); showToast("รีเซ็ตทริปแล้ว"); updateUI(); };

        window.calculateLiters = () => {
            const cost = parseFloat(document.getElementById('inp-cost').value);
            const price = parseFloat(document.getElementById('inp-price').value);
            document.getElementById('inp-liters-display').value = (!isNaN(cost) && !isNaN(price) && price > 0) ? (cost / price).toFixed(2) : "0.00";
        };

        window.saveRecord = async () => {
            const odo = parseFloat(document.getElementById('inp-odo').value);
            const cost = parseFloat(document.getElementById('inp-cost').value);
            const price = parseFloat(document.getElementById('inp-price').value);
            const isFull = document.getElementById('inp-is-full').checked;
            
            if (isNaN(odo) || isNaN(cost) || isNaN(price)) return showToast("ข้อมูลไม่ครบ");

            const newLiters = cost / price;
            let totalLitersAfterRefill = isFull ? TANK_CAPACITY : (lastCalculatedRemainingLiters + newLiters);
            if (totalLitersAfterRefill > TANK_CAPACITY) totalLitersAfterRefill = TANK_CAPACITY;

            const payload = { 
                odo, cost, price, isFull, 
                litersFilled: newLiters, 
                totalLitersAfterRefill: totalLitersAfterRefill,
                timestamp: Date.now(), 
                tripAtRefill: tripDistance 
            };

            if (user && db) {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'refills'), payload);
                    closeForm();
                    showToast("บันทึกสำเร็จ");
                } catch (e) { showToast("Error"); }
            }
        };

        window.deleteRecord = async (id) => { if (user && db) await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'refills', id)); };

        function updateUI() {
            const mode = document.getElementById('metric-mode').value;
            let avgKmL = 10;
            if (records.length >= 2) {
                const totalDist = records[0].odo - records[records.length - 1].odo;
                let totalLitersUsed = 0;
                for (let i = 0; i < records.length - 1; i++) totalLitersUsed += records[i].litersFilled;
                if (totalDist > 0 && totalLitersUsed > 0) avgKmL = totalDist / totalLitersUsed;
            }

            const displayAvg = mode === 'kml' ? avgKmL.toFixed(1) : (records[0] ? (records[0].price / avgKmL).toFixed(2) : '--');
            document.getElementById('display-avg').innerText = records.length >= 2 ? displayAvg : '--';
            document.getElementById('display-unit').innerText = mode === 'kml' ? 'KM/L' : '฿/KM';

            const lastRecord = records[0];
            if (lastRecord) {
                const distSinceLastRefill = tripDistance - (lastRecord.tripAtRefill || 0);
                const fuelConsumed = distSinceLastRefill / avgKmL;
                let currentLiters = Math.max(0, lastRecord.totalLitersAfterRefill - fuelConsumed);
                lastCalculatedRemainingLiters = currentLiters;
                const range = currentLiters * avgKmL;

                document.getElementById('gas-remain-val').innerText = `${currentLiters.toFixed(1)} L`;
                document.getElementById('gas-range-fill').style.width = `${(currentLiters / TANK_CAPACITY) * 100}%`;
                document.getElementById('display-range').innerText = Math.floor(range);
                document.getElementById('gas-range-fill').style.background = currentLiters < 10 ? '#ef4444' : 'linear-gradient(90deg, #3b82f6, #60a5fa)';
            }

            document.getElementById('history-list').innerHTML = records.map(r => `
                <div class="bg-white/60 border border-slate-100 p-6 rounded-[2rem] flex justify-between items-center group shadow-sm">
                    <div>
                        <div class="flex items-center gap-3 mb-1">
                            <span class="text-3xl font-bold text-slate-800">${r.odo.toLocaleString()}</span>
                            <span class="text-[15px] font-bold text-slate-400">กม.</span>
                        </div>
                        <p class="text-[15px] text-slate-400 font-bold uppercase tracking-wider">
                            ${new Date(r.timestamp).toLocaleDateString('th-TH')} • ${r.isFull ? '<span class="text-blue-600">เต็มถัง</span>' : r.litersFilled.toFixed(2) + ' ลิตร'}
                        </p>
                    </div>
                    <div class="flex items-center gap-6">
                        <span class="text-4xl font-black text-emerald-600">${r.cost} ฿</span>
                        <button onclick="deleteRecord('${r.id}')" class="text-red-300 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-8 h-8"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        window.onload = () => { initFirebase(); initMap(); startTracking(); updateUI(); };
        window.updateUI = updateUI;
    </script>
</body>
</html>
