<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LPG Insight - Mobile Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Leaflet.js (Free Map) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Kanit', sans-serif; background-color: #0f172a; color: white; overflow: hidden; margin: 0; padding: 0; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; height: 100vh; width: 100vw; }
        .map-overlay { position: absolute; z-index: 1000; pointer-events: none; width: 100%; }
        .interactable { pointer-events: auto; }
        .glass-ui { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .user-dot { width: 14px; height: 14px; background: #3b82f6; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(59, 130, 246, 0.8); }
        .leaflet-control-attribution { display: none; }
        .safe-bottom { padding-bottom: calc(1rem + env(safe-area-inset-bottom)); }
        input { -webkit-appearance: none; border-radius: 1rem; color: white; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="map"></div>

    <!-- UI Overlay: Top -->
    <div class="map-overlay top-0 p-4 space-y-3">
        <!-- Search Bar -->
        <div class="glass-ui interactable flex items-center gap-2 p-2 rounded-2xl shadow-2xl">
            <div class="p-2 text-blue-400"><i data-lucide="search" class="w-5 h-5"></i></div>
            <input type="text" id="search-input" onfocus="showSearchPanel()" class="bg-transparent border-none outline-none text-sm w-full placeholder:text-slate-500 font-medium" placeholder="ค้นหาปั๊มที่บันทึกไว้...">
            <button onclick="openGoogleMapsSearch()" class="bg-blue-600 p-2 rounded-xl text-white">
                <i data-lucide="map" class="w-5 h-5"></i>
            </button>
        </div>

        <!-- Search Panel -->
        <div id="search-panel" class="hidden glass-ui interactable rounded-2xl p-4 shadow-2xl mt-1 border border-white/10 max-h-[40vh] overflow-y-auto no-scrollbar">
            <div class="flex justify-between items-center mb-3">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ปั๊มใกล้เคียง</span>
                <button onclick="closeSearchPanel()" class="p-1"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div id="search-results-list" class="space-y-2"></div>
        </div>

        <!-- Dashboard Stats -->
        <div class="flex gap-2">
            <div class="glass-ui interactable p-3 rounded-2xl border-l-4 border-blue-500 flex-1 shadow-lg">
                <span class="text-[9px] font-bold text-blue-400 uppercase block tracking-tighter">ความเร็ว</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black" id="current-speed">0</span>
                    <span class="text-[8px] text-slate-500 uppercase">km/h</span>
                </div>
            </div>
            <div class="glass-ui interactable p-3 rounded-2xl border-l-4 border-green-500 flex-1 shadow-lg">
                <span class="text-[9px] font-bold text-green-400 uppercase block tracking-tighter">วิ่งได้อีกประมาณ</span>
                <div class="flex items-baseline gap-1">
                    <span class="text-2xl font-black" id="est-range">--</span>
                    <span class="text-[8px] text-slate-500 uppercase">km</span>
                </div>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Middle Stats -->
    <div class="map-overlay bottom-[120px] px-4 space-y-2">
        <!-- History Preview (Small) -->
        <div id="history-preview" class="glass-ui interactable rounded-2xl p-3 border border-white/5 max-h-[120px] overflow-y-auto no-scrollbar shadow-xl">
            <div class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-2 flex justify-between">
                <span>ประวัติล่าสุด</span>
                <span id="record-count" class="text-blue-400">0 รายการ</span>
            </div>
            <div id="history-list" class="space-y-2">
                <div class="text-[10px] text-slate-500 text-center py-2">ยังไม่มีข้อมูลบันทึก</div>
            </div>
        </div>

        <!-- Main Metrics -->
        <div class="glass-ui interactable grid grid-cols-3 gap-2 px-4 py-3 rounded-3xl border border-white/5 shadow-2xl">
            <div class="text-center border-r border-white/10">
                <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">฿ / KM</div>
                <div class="text-sm font-bold text-blue-300" id="avg-cost">0.00</div>
            </div>
            <div class="text-center border-r border-white/10">
                <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">แก็สคงเหลือ</div>
                <div class="text-sm font-bold text-blue-300" id="gas-remain">0.0</div>
            </div>
            <div class="text-center">
                <div class="text-[8px] text-slate-400 font-bold uppercase tracking-tighter">ทริปล่าสุด</div>
                <div class="text-sm font-bold text-blue-300" id="trip-dist">0</div>
            </div>
        </div>
    </div>

    <!-- UI Overlay: Action Buttons -->
    <div class="map-overlay bottom-0 p-6 flex justify-between items-center safe-bottom">
        <button onclick="saveCurrentLocationManual()" class="interactable bg-white text-slate-900 p-4 rounded-full shadow-2xl active:scale-90 transition-transform">
            <i data-lucide="map-pin" class="w-6 h-6"></i>
        </button>
        <button onclick="toggleForm()" class="interactable bg-blue-600 text-white px-8 py-4 rounded-full shadow-2xl font-bold flex items-center gap-2 active:scale-95">
            <i data-lucide="plus" class="w-5 h-5"></i> บันทึกเติมแก๊ส
        </button>
    </div>

    <!-- Slide Up Form -->
    <div id="form-panel" class="fixed inset-x-0 bottom-0 z-[2001] glass-ui translate-y-full transition-transform duration-500 rounded-t-[3rem] p-8 border-t border-white/10 interactable safe-bottom">
        <div class="w-12 h-1 bg-white/20 rounded-full mx-auto mb-8" onclick="toggleForm()"></div>
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="fuel" class="text-orange-400"></i> บันทึกข้อมูลการเติม</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase">เลขไมล์ล่าสุด</label>
                <input type="number" id="input-odometer" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white font-bold" placeholder="0">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase">ราคา/ลิตร</label>
                <input type="number" step="0.01" id="input-price-per-liter" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white font-bold" placeholder="15.50">
            </div>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-slate-400 uppercase">จำนวนเงิน (บาท)</label>
                <input type="number" id="input-amount" class="w-full bg-white/5 border border-white/10 rounded-2xl p-4 text-white font-bold" placeholder="0">
            </div>
            <div class="space-y-1 opacity-50">
                <label class="text-[10px] font-bold text-slate-400 uppercase">จำนวนลิตร</label>
                <input type="number" id="input-liters" class="w-full bg-white/10 border-0 rounded-2xl p-4 text-white font-bold" readonly>
            </div>
        </div>
        <button onclick="addRefillRecord()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-xl active:bg-blue-700 transition-colors">ยืนยันบันทึกข้อมูล</button>
        <button onclick="toggleForm()" class="w-full text-slate-400 font-bold py-4">ยกเลิก</button>
    </div>

    <script type="module">
        // --- State Management ---
        let records = JSON.parse(localStorage.getItem('lpg_records')) || [];
        let stations = JSON.parse(localStorage.getItem('lpg_stations')) || [];
        let map, userMarker;
        let currentPos = [13.7563, 100.5018]; // Default: Bangkok
        let isFormOpen = false;

        // Firebase Fallback
        let db = null;
        async function initFirebase() {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js");
                    const { getFirestore } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
                    const app = initializeApp(JSON.parse(__firebase_config));
                    db = getFirestore(app);
                    console.log("Cloud Persistence Enabled");
                }
            } catch (e) {
                console.warn("Firebase config not found, using Local Storage only.");
            }
        }

        // --- Global Functions (Attached to Window for Mobile Support) ---
        window.toggleForm = () => {
            const panel = document.getElementById('form-panel');
            isFormOpen = !isFormOpen;
            panel.style.transform = isFormOpen ? 'translateY(0)' : 'translateY(100%)';
        };

        window.showSearchPanel = () => {
            document.getElementById('search-panel').classList.remove('hidden');
            updateSearchResults();
        };

        window.closeSearchPanel = () => document.getElementById('search-panel').classList.add('hidden');

        window.openGoogleMapsSearch = () => {
            window.open(`https://www.google.com/maps/search/LPG+station/@${currentPos[0]},${currentPos[1]},14z`, '_blank');
        };

        window.addRefillRecord = () => {
            const odoInput = document.getElementById('input-odometer');
            const amtInput = document.getElementById('input-amount');
            const priceInput = document.getElementById('input-price-per-liter');

            const odo = parseFloat(odoInput.value);
            const amt = parseFloat(amtInput.value);
            const price = parseFloat(priceInput.value);
            const liters = price > 0 ? amt / price : 0;

            if (!odo || !amt || !price) {
                alert("กรุณากรอกข้อมูลให้ครบถ้วนก่อนบันทึก");
                return;
            }

            const newRecord = { odo, amt, liters, price, timestamp: Date.now() };
            records.unshift(newRecord);
            localStorage.setItem('lpg_records', JSON.stringify(records));
            
            // Auto Save Station Location
            const newStation = { lat: currentPos[0], lng: currentPos[1], timestamp: Date.now() };
            stations.push(newStation);
            localStorage.setItem('lpg_stations', JSON.stringify(stations));

            updateUI();
            updateMapMarkers();
            toggleForm();
            
            // Clear inputs
            odoInput.value = '';
            amtInput.value = '';
            
            alert("บันทึกข้อมูลเรียบร้อยแล้ว");
        };

        window.saveCurrentLocationManual = () => {
            const newStation = { lat: currentPos[0], lng: currentPos[1], timestamp: Date.now() };
            stations.push(newStation);
            localStorage.setItem('lpg_stations', JSON.stringify(stations));
            updateMapMarkers();
            alert("บันทึกพิกัดปั๊มปัจจุบันเรียบร้อยแล้ว");
        };

        // --- Core Functions ---
        function initMap() {
            // Initialize map with a default view first to ensure visibility
            map = L.map('map', { 
                zoomControl: false, 
                attributionControl: false,
                touchZoom: true
            }).setView(currentPos, 16);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            const userIcon = L.divIcon({ className: 'user-dot', iconSize: [14, 14] });
            userMarker = L.marker(currentPos, { icon: userIcon }).addTo(map);
            
            updateMapMarkers();
        }

        function updateMapMarkers() {
            if (!map) return;
            stations.forEach(s => {
                L.circleMarker([s.lat, s.lng], { 
                    radius: 6, 
                    fillColor: "#3b82f6", 
                    color: "#fff", 
                    weight: 2, 
                    fillOpacity: 1 
                }).addTo(map);
            });
        }

        function startTracking() {
            if (!navigator.geolocation) {
                console.error("Geolocation is not supported by this browser.");
                return;
            }

            navigator.geolocation.watchPosition((pos) => {
                currentPos = [pos.coords.latitude, pos.coords.longitude];
                const speed = pos.coords.speed && pos.coords.speed > 0 ? Math.round(pos.coords.speed * 3.6) : 0;
                
                document.getElementById('current-speed').innerText = speed;
                
                if (userMarker) userMarker.setLatLng(currentPos);
                if (!isFormOpen && map) map.panTo(currentPos);
                
                updateUI();
            }, (err) => {
                console.warn("GPS Access Error: ", err.message);
            }, { enableHighAccuracy: true });
        }

        function updateUI() {
            const historyList = document.getElementById('history-list');
            const countLabel = document.getElementById('record-count');
            
            countLabel.innerText = `${records.length} รายการ`;

            if (records.length === 0) {
                historyList.innerHTML = `<div class="text-[10px] text-slate-500 text-center py-2">ยังไม่มีข้อมูลบันทึก</div>`;
                return;
            }

            // Update Metrics
            const latest = records[0];
            document.getElementById('gas-remain').innerText = latest.liters.toFixed(1);

            if (records.length >= 2) {
                const prev = records[1];
                const trip = latest.odo - prev.odo;
                const costKm = latest.amt / trip;
                const kmL = trip / latest.liters;
                
                document.getElementById('avg-cost').innerText = costKm.toFixed(2);
                document.getElementById('trip-dist').innerText = trip;
                document.getElementById('est-range').innerText = (latest.liters * kmL).toFixed(0);
            }

            // Update History List (Show last 5)
            historyList.innerHTML = records.slice(0, 5).map(r => `
                <div class="flex justify-between items-center bg-white/5 p-2 rounded-xl border border-white/5">
                    <div>
                        <div class="text-[10px] font-bold">${new Date(r.timestamp).toLocaleDateString('th-TH')}</div>
                        <div class="text-[8px] text-slate-400">เลขไมล์: ${r.odo.toLocaleString()}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-[10px] font-bold text-blue-400">${r.amt} ฿</div>
                        <div class="text-[8px] text-slate-500">${r.liters.toFixed(2)} ลิตร</div>
                    </div>
                </div>
            `).join('');
        }

        window.updateSearchResults = () => {
            const list = document.getElementById('search-results-list');
            if (stations.length === 0) {
                list.innerHTML = `<div class="text-center py-4 text-xs text-slate-500">ไม่พบปั๊มที่บันทึกไว้</div>`;
                return;
            }
            list.innerHTML = stations.slice(-10).reverse().map(s => `
                <div class="bg-white/5 p-3 rounded-xl flex justify-between items-center border border-white/5 active:bg-white/10" 
                     onclick="map.flyTo([${s.lat}, ${s.lng}], 17); closeSearchPanel();">
                    <div class="flex items-center gap-2">
                        <i data-lucide="map-pin" class="w-4 h-4 text-blue-400"></i>
                        <span class="text-xs">ปั๊มที่เคยบันทึกไว้เมื่อ ${new Date(s.timestamp).toLocaleDateString('th-TH')}</span>
                    </div>
                    <i data-lucide="chevron-right" class="w-4 h-4 text-slate-600"></i>
                </div>
            `).join('');
            lucide.createIcons();
        };

        // --- Init ---
        window.onload = async () => {
            await initFirebase();
            lucide.createIcons();
            initMap();
            startTracking();
            updateUI();
            
            // Auto Calculation for liters in Form
            const amtInp = document.getElementById('input-amount');
            const priceInp = document.getElementById('input-price-per-liter');
            const literInp = document.getElementById('input-liters');
            
            const calcLiters = () => {
                const a = parseFloat(amtInp.value);
                const p = parseFloat(priceInp.value);
                literInp.value = (a && p && p > 0) ? (a / p).toFixed(2) : '0.00';
            };
            
            amtInp.addEventListener('input', calcLiters);
            priceInp.addEventListener('input', calcLiters);
        };
    </script>
</body>
</html>
