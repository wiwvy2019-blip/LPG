<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LPG Insight Cloud Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#2563eb">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        html, body { 
            height: 100%; width: 100%; margin: 0; padding: 0; 
            background-color: #0f172a; overflow: hidden; position: fixed; 
            font-family: 'Kanit', sans-serif;
        }
        
        #map { 
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; 
            z-index: 1; background: #1e293b;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 12px 40px 0 rgba(31, 38, 135, 0.15);
        }

        .car-marker {
            width: 26px; height: 26px;
            background: #2563eb;
            border: 3px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            box-shadow: 0 0 12px rgba(37, 99, 235, 0.6);
        }

        .pump-marker {
            background: #ef4444;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 4px 10px rgba(239, 68, 68, 0.4);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .range-bar { height: 7px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .range-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #60a5fa); transition: width 0.5s ease; }

        .leaflet-popup-content-wrapper {
            border-radius: 16px;
            padding: 5px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="map"></div>

    <!-- UI Overlay: Top Stats -->
    <div class="fixed top-0 left-0 right-0 z-[1000] p-4 pt-[calc(0.8rem+env(safe-area-inset-top))] flex justify-between items-start pointer-events-none">
        <div class="flex flex-col gap-2">
            <div class="glass-panel pointer-events-auto p-2.5 rounded-2xl flex items-center gap-3">
                <div class="bg-blue-600 p-1.5 rounded-xl text-white shadow-md">
                    <i data-lucide="gauge" class="w-5 h-5"></i>
                </div>
                <div>
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider block leading-none mb-1">ความเร็ว</span>
                    <div class="flex items-baseline gap-1">
                        <span id="display-speed" class="text-3xl font-black text-slate-800 leading-none">0</span>
                        <span class="text-xs font-bold text-slate-400">กม./ชม.</span>
                    </div>
                </div>
            </div>

            <!-- Range Widget -->
            <div class="glass-panel pointer-events-auto p-2.5 rounded-2xl flex items-center gap-3 border-l-4 border-blue-500">
                <div class="bg-slate-100 p-1.5 rounded-xl text-blue-600">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                </div>
                <div>
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider block leading-none mb-1">ระยะที่วิ่งได้</span>
                    <div class="flex items-baseline gap-1">
                        <span id="display-range" class="text-3xl font-black text-blue-600 leading-none">0</span>
                        <span class="text-xs font-bold text-slate-400">กม.</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col gap-2 items-end">
            <div class="glass-panel pointer-events-auto p-2.5 rounded-2xl min-w-[110px]">
                <div class="flex items-center justify-between gap-2 mb-1">
                    <span class="text-[11px] font-bold text-emerald-600 uppercase tracking-wider">ประสิทธิภาพ</span>
                    <select id="metric-mode" onchange="updateUI()" class="text-[9px] bg-slate-100 rounded px-1 py-0.5 outline-none font-bold">
                        <option value="kml">กม./ลิตร</option>
                        <option value="bkm">บาท/กม.</option>
                    </select>
                </div>
                <div class="flex items-baseline gap-1">
                    <span id="display-avg" class="text-3xl font-black text-slate-800 leading-none">--</span>
                    <span id="display-unit" class="text-xs font-bold text-slate-400 uppercase tracking-tighter">KM/L</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Map Controls -->
    <div class="fixed right-4 top-1/2 -translate-y-1/2 z-[1000] flex flex-col gap-3">
        <button onclick="locateMe()" class="w-12 h-12 glass-panel rounded-full flex items-center justify-center text-blue-600 shadow-lg active:scale-90 transition-transform">
            <i data-lucide="navigation" class="w-6 h-6"></i>
        </button>
        <button onclick="saveStation()" class="w-12 h-12 glass-panel rounded-full flex items-center justify-center text-emerald-600 shadow-lg active:scale-90 transition-transform">
            <i data-lucide="map-pin-plus" class="w-6 h-6"></i>
        </button>
    </div>

    <!-- History Panel -->
    <div id="history-drawer" class="fixed inset-x-0 bottom-0 z-[2000] translate-y-full transition-transform duration-500 ease-out">
        <div class="glass-panel rounded-t-[2rem] p-5 shadow-2xl max-h-[75vh] overflow-hidden flex flex-col">
            <div class="w-10 h-1 bg-slate-300 rounded-full mx-auto mb-5 cursor-pointer" onclick="toggleHistory()"></div>
            <div class="flex justify-between items-center mb-5 px-1">
                <h3 class="text-xl font-bold text-slate-800">ประวัติการเติม</h3>
                <button onclick="exportData()" class="text-blue-600 text-[10px] font-bold flex items-center gap-1 bg-blue-50 px-3 py-1.5 rounded-full">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> ส่งออก
                </button>
            </div>
            <div id="history-list" class="flex-grow overflow-y-auto space-y-2.5 no-scrollbar pb-10"></div>
        </div>
    </div>

    <!-- Main Control Bar -->
    <div class="fixed bottom-0 left-0 right-0 z-[1001] p-4 pb-[calc(0.8rem+env(safe-area-inset-bottom))]">
        <div class="glass-panel rounded-[1.8rem] p-3.5 flex items-center justify-between shadow-2xl">
            <div class="flex-1">
                <div class="flex justify-between items-end mb-1">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest leading-none">แก๊สในถัง</span>
                    <span id="gas-remain-val" class="text-lg font-black text-blue-600 leading-none">0.0 L</span>
                </div>
                <div class="range-bar">
                    <div id="gas-range-fill" class="range-fill" style="width: 0%"></div>
                </div>
            </div>

            <div class="mx-5 relative">
                <button onclick="openForm()" class="w-16 h-16 bg-blue-600 text-white rounded-[1.8rem] flex items-center justify-center shadow-xl active:scale-90 transition-transform -mt-14 border-[4px] border-white">
                    <i data-lucide="plus" class="w-9 h-9"></i>
                </button>
            </div>

            <div class="flex-1 flex justify-end gap-3.5">
                <button onclick="toggleHistory()" class="flex flex-col items-center text-slate-400 hover:text-blue-600 transition-colors">
                    <i data-lucide="calendar-days" class="w-7 h-7"></i>
                    <span class="text-[9px] font-bold uppercase mt-1">ประวัติ</span>
                </button>
                <button onclick="resetTrip()" class="flex flex-col items-center text-slate-400 hover:text-red-600 transition-colors">
                    <i data-lucide="rotate-ccw" class="w-7 h-7"></i>
                    <span class="text-[9px] font-bold uppercase mt-1">รีเซ็ต</span>
                </button>
            </div>
        </div>
        
        <div class="absolute -top-5 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-1.5 rounded-full shadow-lg flex items-center gap-2">
            <i data-lucide="milestone" class="w-3.5 h-3.5 text-blue-400"></i>
            <span class="text-[11px] font-bold tracking-widest uppercase">ทริป: <span id="display-trip" class="text-white text-base ml-1">0.00</span> กม.</span>
        </div>
    </div>

    <!-- Form Modal -->
    <div id="form-modal" class="fixed inset-0 z-[3000] hidden">
        <div class="absolute inset-0 bg-slate-900/70 backdrop-blur-md" onclick="closeForm()"></div>
        <div class="absolute inset-x-0 bottom-0 glass-panel rounded-t-[2.5rem] p-7 animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800" id="form-title">บันทึกข้อมูล</h2>
                    <p class="text-slate-500 text-base">ระบุข้อมูลการเติมแก๊ส</p>
                </div>
                <button onclick="closeForm()" class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center text-slate-400">
                    <i data-lucide="x" class="w-7 h-7"></i>
                </button>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-5">
                <div class="col-span-2">
                    <label class="text-[12px] font-bold text-slate-500 uppercase tracking-widest mb-1 block ml-1">เลขไมล์รถยนต์ (ODO)</label>
                    <input type="number" id="inp-odo" class="w-full bg-slate-100/50 border-[2px] border-slate-200 rounded-xl p-3 text-2xl font-bold text-slate-800 focus:border-blue-500 outline-none" placeholder="0">
                </div>
                <div>
                    <label class="text-[12px] font-bold text-slate-500 uppercase tracking-widest mb-1 block ml-1">จำนวนเงิน (บาท)</label>
                    <input type="number" id="inp-cost" oninput="calculateLiters()" class="w-full bg-slate-100/50 border-[2px] border-slate-200 rounded-xl p-3 text-2xl font-bold text-slate-800 focus:border-blue-500 outline-none" placeholder="0">
                </div>
                <div>
                    <label class="text-[12px] font-bold text-slate-500 uppercase tracking-widest mb-1 block ml-1">ราคา/ลิตร</label>
                    <input type="number" step="0.01" id="inp-price" oninput="calculateLiters()" class="w-full bg-slate-100/50 border-[2px] border-slate-200 rounded-xl p-3 text-2xl font-bold text-slate-800 focus:border-blue-500 outline-none" placeholder="0.00">
                </div>
                <div class="col-span-2">
                    <label class="text-[12px] font-bold text-blue-600 uppercase tracking-widest mb-1 block ml-1">ปริมาณที่เติม (ลิตร)</label>
                    <div class="relative">
                        <input type="text" id="inp-liters-display" readonly class="w-full bg-blue-100/30 border-[2px] border-blue-200 rounded-xl p-3 text-2xl font-bold text-blue-700 outline-none" placeholder="0.00">
                        <span class="absolute right-4 top-1/2 -translate-y-1/2 text-base font-bold text-blue-400">ลิตร</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-3 mb-6 bg-blue-50 p-3.5 rounded-xl border-2 border-blue-100">
                <input type="checkbox" id="inp-is-full" class="w-7 h-7 rounded text-blue-600 border-2 border-blue-200">
                <label for="inp-is-full" class="font-bold text-blue-800 text-lg">เติมเต็มถัง (54 ลิตร)</label>
            </div>

            <button onclick="saveRecord()" class="w-full bg-blue-600 text-white py-4 rounded-xl text-xl font-bold shadow-xl active:bg-blue-700 transition-all flex items-center justify-center gap-3">
                <i data-lucide="check-circle" class="w-7 h-7"></i>
                ยืนยันบันทึก
            </button>
            <div class="h-4"></div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[4000] opacity-0 transition-all duration-300 pointer-events-none">
        <div class="bg-slate-900 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3">
            <span id="toast-msg" class="text-base font-bold"></span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global States
        let db, auth, user;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'lpg-insight-cloud-v3';
        let records = JSON.parse(localStorage.getItem('lpg_v3_records') || '[]');
        let stations = JSON.parse(localStorage.getItem('lpg_v3_stations') || '[]');
        let tripDistance = parseFloat(localStorage.getItem('lpg_v3_trip') || '0');
        let currentPos = [13.7563, 100.5018];
        let map, userMarker, pathLine;
        let isDrawerOpen = false;
        
        const TANK_CAPACITY = 54;
        let lastCalculatedRemainingLiters = 0;

        // Initialize Firebase & Auth
        async function initFirebase() {
            try {
                const config = JSON.parse(__firebase_config);
                const app = initializeApp(config);
                auth = getAuth(app);
                db = getFirestore(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                await initAuth();

                onAuthStateChanged(auth, (u) => {
                    user = u;
                    if (user) syncCloudData();
                });
            } catch (e) { 
                console.warn("Firebase initialization failed, running in local-only mode.");
                showToast("ใช้งานแบบออฟไลน์"); 
            }
        }

        // Sync with Cloud
        function syncCloudData() {
            if (!user || !db) return;
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'refills'), (snap) => {
                if (!snap.empty) {
                    records = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => b.odo - a.odo);
                    localStorage.setItem('lpg_v3_records', JSON.stringify(records));
                    updateUI();
                }
            });
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'stations'), (snap) => {
                stations = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                localStorage.setItem('lpg_v3_stations', JSON.stringify(stations));
                renderStations();
            });
        }

        // Map Functions
        function initMap() {
            if (map) return;
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(currentPos, 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 20 }).addTo(map);

            userMarker = L.marker(currentPos, { icon: L.divIcon({ className: 'car-marker' }) }).addTo(map);
            pathLine = L.polyline([], { color: '#2563eb', weight: 4, opacity: 0.4, dashArray: '5, 8' }).addTo(map);

            map.on('click', (e) => {
                const { lat, lng } = e.latlng;
                const content = document.createElement('div');
                content.className = 'p-1 text-center';
                content.innerHTML = `<p class="text-sm font-bold mb-2">ลงพิกัดปั๊มที่จุดนี้?</p><button id="p-add" class="bg-blue-600 text-white text-[10px] px-4 py-1.5 rounded-full font-bold shadow-md active:scale-95 transition-all">บันทึกพิกัด</button>`;
                L.popup().setLatLng(e.latlng).setContent(content).openOn(map);
                content.querySelector('#p-add').onclick = () => { saveStation(lat, lng); map.closePopup(); };
            });

            setTimeout(() => map.invalidateSize(), 500);
            renderStations();
        }

        window.locateMe = () => { if (map && currentPos) map.flyTo(currentPos, 17, { duration: 1.5 }); };

        window.saveStation = async (lat, lng) => {
            const targetLat = lat || map.getCenter().lat;
            const targetLng = lng || map.getCenter().lng;
            const newStation = { lat: targetLat, lng: targetLng, timestamp: Date.now() };
            
            // Local update
            stations.push(newStation);
            renderStations();

            if (user && db) {
                try { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'stations'), newStation); } catch (e) {}
            }
            showToast("บันทึกพิกัดปั๊มแล้ว");
        };

        function renderStations() {
            if (!map) return;
            map.eachLayer(l => { if (l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
            stations.forEach(s => {
                const marker = L.marker([s.lat, s.lng], { icon: L.divIcon({ className: 'pump-marker', html: '<i data-lucide="fuel" style="width:12px; height:12px"></i>', iconSize: [24, 24] }) }).addTo(map);
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    L.popup().setLatLng([s.lat, s.lng]).setContent(`<div class="p-1 text-center"><p class="text-sm font-bold mb-2">ลบพิกัดนี้หรือไม่?</p><button onclick="deleteStation('${s.id || s.timestamp}')" class="bg-red-500 text-white text-[10px] px-4 py-1.5 rounded-full font-bold">ยืนยันการลบ</button></div>`).openOn(map);
                });
            });
            lucide.createIcons();
        }

        window.deleteStation = async (id) => {
            stations = stations.filter(s => (s.id || s.timestamp).toString() !== id.toString());
            renderStations();
            if (user && db && id.toString().length > 15) { // Likely a Firebase ID
                try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'stations', id)); } catch (e) {}
            }
            map.closePopup();
        };

        // Tracking & Distance
        function startTracking() {
            if (!navigator.geolocation) return;
            navigator.geolocation.watchPosition(pos => {
                const { latitude, longitude, speed } = pos.coords;
                const d = calcDist(currentPos[0], currentPos[1], latitude, longitude);
                if (d > 0.005) { // 5 meters minimum
                    tripDistance += d;
                    localStorage.setItem('lpg_v3_trip', tripDistance);
                    pathLine.addLatLng([latitude, longitude]);
                }
                currentPos = [latitude, longitude];
                if (userMarker) userMarker.setLatLng(currentPos);
                document.getElementById('display-speed').innerText = speed > 0 ? Math.round(speed * 3.6) : 0;
                document.getElementById('display-trip').innerText = tripDistance.toFixed(2);
                updateUI();
            }, null, { enableHighAccuracy: true });
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2)**2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        // Logic & Saving
        window.openForm = () => { 
            document.getElementById('form-modal').classList.remove('hidden'); 
            document.getElementById('inp-price').value = records[0]?.price || "15.50";
            calculateLiters(); 
        };
        window.closeForm = () => document.getElementById('form-modal').classList.add('hidden');
        window.toggleHistory = () => { 
            isDrawerOpen = !isDrawerOpen; 
            document.getElementById('history-drawer').style.transform = isDrawerOpen ? 'translateY(0)' : 'translateY(100%)'; 
        };

        window.resetTrip = () => { 
            tripDistance = 0; 
            localStorage.setItem('lpg_v3_trip', 0); 
            if(pathLine) pathLine.setLatLngs([]); 
            showToast("รีเซ็ตทริปสำเร็จ"); 
            updateUI(); 
        };

        window.calculateLiters = () => {
            const cost = parseFloat(document.getElementById('inp-cost').value);
            const price = parseFloat(document.getElementById('inp-price').value);
            const liters = (!isNaN(cost) && !isNaN(price) && price > 0) ? (cost / price) : 0;
            document.getElementById('inp-liters-display').value = liters.toFixed(2);
        };

        window.saveRecord = async () => {
            const odo = parseFloat(document.getElementById('inp-odo').value);
            const cost = parseFloat(document.getElementById('inp-cost').value);
            const price = parseFloat(document.getElementById('inp-price').value);
            const isFull = document.getElementById('inp-is-full').checked;
            
            if (isNaN(odo) || isNaN(cost) || isNaN(price)) return showToast("กรุณากรอกข้อมูลให้ครบถ้วน");

            const newLiters = cost / price;
            
            // Logic: ถ้าเต็มถัง = 54 ลิตร | ถ้าไม่เต็ม = แก๊สเหลือ + แก๊สใหม่
            let totalLitersAfterRefill = isFull ? TANK_CAPACITY : (lastCalculatedRemainingLiters + newLiters);
            if (totalLitersAfterRefill > TANK_CAPACITY) totalLitersAfterRefill = TANK_CAPACITY;

            const payload = { 
                odo, cost, price, isFull, 
                litersFilled: newLiters, 
                totalLitersAfterRefill: totalLitersAfterRefill,
                timestamp: Date.now(), 
                tripAtRefill: tripDistance 
            };

            // Local First: อัปเดต UI ทันทีไม่ต้องรอ Cloud
            records.unshift({ id: 'temp-' + Date.now(), ...payload });
            localStorage.setItem('lpg_v3_records', JSON.stringify(records));
            updateUI();
            closeForm();
            showToast("บันทึกข้อมูลเรียบร้อย");

            // Cloud Async: บันทึกขึ้น Cloud เงียบๆ
            if (user && db) {
                try { await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'refills'), payload); } catch (e) { console.error("Cloud save failed", e); }
            }
        };

        window.deleteRecord = async (id) => {
            records = records.filter(r => (r.id || r.timestamp).toString() !== id.toString());
            localStorage.setItem('lpg_v3_records', JSON.stringify(records));
            updateUI();
            if (user && db && id.toString().length > 15) {
                try { await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'refills', id)); } catch (e) {}
            }
        };

        function updateUI() {
            const mode = document.getElementById('metric-mode').value;
            
            // 1. Calculate Average KM/L (อ้างอิงจากประวัติ)
            let avgKmL = 10; // Default
            if (records.length >= 2) {
                const totalDist = records[0].odo - records[records.length - 1].odo;
                let totalLitersUsed = 0;
                // คำนวณแก๊สที่ใช้ไประหว่างจุด A ถึง B
                for (let i = 0; i < records.length - 1; i++) totalLitersUsed += records[i].litersFilled;
                if (totalDist > 0 && totalLitersUsed > 0) avgKmL = totalDist / totalLitersUsed;
            }

            // 2. Display Averages
            const displayAvg = mode === 'kml' ? avgKmL.toFixed(1) : (records[0] ? (records[0].price / avgKmL).toFixed(2) : '--');
            document.getElementById('display-avg').innerText = records.length >= 2 ? displayAvg : '--';
            document.getElementById('display-unit').innerText = mode === 'kml' ? 'KM/L' : '฿/KM';

            // 3. Current Gas & Range Calculation
            const lastRecord = records[0];
            if (lastRecord) {
                const distSinceLastRefill = tripDistance - (lastRecord.tripAtRefill || 0);
                const fuelConsumed = distSinceLastRefill / avgKmL;
                let currentLiters = Math.max(0, lastRecord.totalLitersAfterRefill - fuelConsumed);
                
                lastCalculatedRemainingLiters = currentLiters; // เก็บไว้ใช้บวกตอนเติมครั้งถัดไป
                
                const range = currentLiters * avgKmL;

                document.getElementById('gas-remain-val').innerText = `${currentLiters.toFixed(1)} L`;
                document.getElementById('gas-range-fill').style.width = `${(currentLiters / TANK_CAPACITY) * 100}%`;
                document.getElementById('display-range').innerText = Math.floor(range);
                document.getElementById('gas-range-fill').style.background = currentLiters < 8 ? '#ef4444' : 'linear-gradient(90deg, #3b82f6, #60a5fa)';
            } else {
                document.getElementById('display-range').innerText = "0";
                document.getElementById('gas-remain-val').innerText = "0.0 L";
                document.getElementById('gas-range-fill').style.width = "0%";
            }

            // 4. Render History
            document.getElementById('history-list').innerHTML = records.map(r => `
                <div class="bg-white/60 border border-slate-100 p-3.5 rounded-2xl flex justify-between items-center group shadow-sm transition-all active:scale-[0.98]">
                    <div>
                        <div class="flex items-center gap-1.5 mb-0.5">
                            <span class="text-xl font-bold text-slate-800">${r.odo.toLocaleString()}</span>
                            <span class="text-[11px] font-bold text-slate-400">กม.</span>
                        </div>
                        <p class="text-[11px] text-slate-400 font-bold uppercase tracking-wider">
                            ${new Date(r.timestamp).toLocaleDateString('th-TH')} • ${r.isFull ? '<span class="text-blue-600">เต็มถัง</span>' : r.litersFilled.toFixed(2) + ' ลิตร'}
                        </p>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="text-2xl font-black text-emerald-600">${r.cost} ฿</span>
                        <button onclick="deleteRecord('${r.id || r.timestamp}')" class="text-red-300 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            toast.classList.replace('opacity-0', 'opacity-100');
            setTimeout(() => toast.classList.replace('opacity-100', 'opacity-0'), 3000);
        }

        // Global exports for onclick
        window.calculateLiters = calculateLiters;
        window.saveRecord = saveRecord;
        window.deleteRecord = deleteRecord;
        window.deleteStation = deleteStation;
        window.updateUI = updateUI;
        window.exportData = () => {
            const data = JSON.stringify({records, stations, tripDistance}, null, 2);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `lpg-insight-export-${Date.now()}.json`;
            a.click();
            showToast("ส่งออกข้อมูลสำเร็จ");
        };

        // App Start
        window.addEventListener('load', () => {
            initFirebase();
            initMap();
            startTracking();
            updateUI();
        });
    </script>
</body>
</html>
